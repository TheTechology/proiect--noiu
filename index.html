<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<title>Grupul Verde — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { background: #fafaf7; margin: 0; }
  [data-screen-label] { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Button.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState(() => localStorage.getItem('gv-route') || 'home');
  useEffect(() => { localStorage.setItem('gv-route', route); window.scrollTo(0,0); }, [route]);

  return (
    <div>
      <Header route={route} setRoute={setRoute} />
      {route === 'home' && (
        <div data-screen-label="01 Home">
          <Hero setRoute={setRoute} />
          <StatRow />
          <ProgramGrid setRoute={setRoute} />
          <CsrSteps />
          <OptionsGrid setRoute={setRoute} />
          <FaqList />
        </div>
      )}
      {route === 'program' && (
        <div data-screen-label="02 Program detail">
          <ProgramDetail setRoute={setRoute} />
        </div>
      )}
      {route === 'csr' && (
        <div data-screen-label="03 CSR form">
          <CsrForm setRoute={setRoute} />
        </div>
      )}
      {route === 'donate' && (
        <div data-screen-label="04 Donate">
          <CsrForm setRoute={setRoute} />
        </div>
      )}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
